<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4); padding: 24px; transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.5); transform: translateY(-2px); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover, .btn:hover { transform: scale(1.02); background: linear-gradient(90deg, #1e5ad9, #1240a0); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        .btn-danger { background: linear-gradient(90deg, #dc2626, #b91c1c); }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 24px; color: white; width: 100%; outline: none; margin: 8px 0; }
        input:focus, select:focus { border-color: #3b82f6; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.96); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 60px; margin-bottom: 25px; }
        .platform-icons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .platform-icon-item { background: rgba(30, 41, 59, 0.6); border-radius: 50px; padding: 10px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .platform-icon-item:hover { background: #2b6ef0; transform: translateY(-3px); }
        .platform-icon-item.active { background: #2b6ef0; border-color: white; }
        .platform-icon-item i { font-size: 20px; }
        .payment-method-card { background: rgba(30, 41, 59, 0.5); border-radius: 20px; padding: 20px; margin: 15px 0; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .payment-method-card:hover { background: rgba(30, 41, 59, 0.8); transform: translateX(5px); }
        .payment-method-card.selected { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .order-summary { background: rgba(0, 200, 255, 0.1); border-radius: 20px; padding: 15px; margin-top: 20px; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172ae6; backdrop-filter: blur(20px); border-radius: 32px; padding: 24px; width: 90%; max-width: 500px; z-index: 1100; display: none; border: 1px solid cyan; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 2000; border-left: 4px solid #2b6ef0; max-width: 350px; }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .service-card { cursor: pointer; }
        .service-card:hover { transform: translateY(-5px); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 25px 0; }
        @media (max-width: 768px) { .form-row { flex-direction: column; } .platform-icon-item { padding: 6px 12px; font-size: 12px; } }
        .service-detail-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; margin: 15px 0; }
        .badge { background: #2b6ef0; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
        <h3><i class="fas fa-chart-line"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 15px;">
        <a href="#" data-page="home"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="recommendations"><i class="fas fa-star"></i> Recommendations</a>
        <a href="#" data-page="joinus"><i class="fas fa-user-plus"></i> Join Us & Earn</a>
        <a href="#" data-page="help"><i class="fas fa-question-circle"></i> Help</a>
        <div class="currency-toggle" style="margin-top: 20px;">
            <label>Currency:</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button data-curr="PKR">PKR</button><button data-curr="USD">USD</button><button data-curr="AED">AED</button><button data-curr="SAR">SAR</button><button data-curr="INR">INR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700; font-size:1.2rem;">MTS SMM Services</div>
        <div class="user-info"><i class="fas fa-sync-alt refresh-btn" id="refreshBtn"></i><span id="userAvatar"><i class="fas fa-user-circle"></i></span><span id="userNameDisplay">Guest</span></div>
    </div>
    <div id="pageContent">Loading...</div>
</div>

<div id="successModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size: 60px; color: #10b981;"></i>
        <h2 id="successTitle">Order Placed!</h2>
        <p id="successMessage"></p>
        <button onclick="closeSuccessModal()" class="btn">OK</button>
    </div>
</div>

<script>
    // ========== REPLACE WITH YOUR APPS SCRIPT URL ==========
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3RsONpQBcraHspJGXId2BaaWaxIrTLuPltiu9tyiFE1UpvIuoNNxhwKVrpl1jFBJm/exec";
    // ========================================================
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let exchangeRates = { PKR:1, USD:0.0036, AED:0.0132, SAR:0.0135, INR:0.3 };
    let allServices = [];
    let selectedService = null;
    let selectedPaymentMethod = null;
    
    // Platform icons mapping
    const platforms = [
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F" },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#000000" },
        { name: "Facebook", icon: "fab fa-facebook", color: "#1877F2" },
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000" },
        { name: "Twitter", icon: "fab fa-twitter", color: "#1DA1F2" },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366" },
        { name: "Snapchat", icon: "fab fa-snapchat", color: "#FFFC00" },
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4" },
        { name: "LinkedIn", icon: "fab fa-linkedin", color: "#0A66C2" },
        { name: "Pinterest", icon: "fab fa-pinterest", color: "#BD081C" },
        { name: "Discord", icon: "fab fa-discord", color: "#5865F2" },
        { name: "Twitch", icon: "fab fa-twitch", color: "#9146FF" },
        { name: "Spotify", icon: "fab fa-spotify", color: "#1DB954" },
        { name: "Google", icon: "fab fa-google", color: "#4285F4" },
        { name: "Threads", icon: "fab fa-threads", color: "#000000" },
        { name: "Netflix", icon: "fas fa-film", color: "#E50914" },
        { name: "Canva", icon: "fas fa-palette", color: "#00C4CC" },
        { name: "CapCut", icon: "fas fa-cut", color: "#00D4FF" },
        { name: "ChatGPT", icon: "fas fa-comment-dots", color: "#10A37F" },
        { name: "Gemini", icon: "fas fa-brain", color: "#4285F4" },
        { name: "Website Traffic", icon: "fas fa-globe", color: "#3b82f6" },
        { name: "PUBG UC", icon: "fas fa-gamepad", color: "#FFA500" }
    ];
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeSuccessModal() {
        document.getElementById('successModal').style.display = 'none';
        location.reload();
    }
    
    async function apiCall(action, data = {}) {
        const payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            const text = await res.text();
            return JSON.parse(text);
        } catch(err) {
            console.error(err);
            return { success: false, error: err.message };
        }
    }
    
    function convertPrice(pricePKR) { let val = pricePKR * (exchangeRates[activeCurrency] || 1); return Math.round(val * 100)/100; }
    function formatCurr(amountPKR) { return `${activeCurrency} ${convertPrice(amountPKR).toFixed(2)}`; }
    
    async function loadServices() { 
        let res = await apiCall("getServices"); 
        if(res.success) allServices = res.services; 
        else showToast("Failed to load services", true);
    }
    
    async function checkAuth() { 
        let token = localStorage.getItem("mts_token"); 
        if(!token) { showAuthScreen(); return false; } 
        let res = await apiCall("verifySession", { token }); 
        if(res.success) { 
            currentUser = res.user; 
            document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; 
            return true; 
        } else { 
            localStorage.removeItem("mts_token"); 
            showAuthScreen(); 
            return false; 
        } 
    }
    
    function showAuthScreen() { 
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:50px auto;padding:30px;">
                <h2 style="margin-bottom:20px;"><i class="fas fa-rocket"></i> Welcome to MTS SMM</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" style="width:100%; margin:10px 0;">Login</button>
                    <button id="showSignupBtn" style="background:transparent; border:1px solid #2b6ef0;">Create Account</button>
                    <button id="forgotBtn" style="background:transparent; color:#94a3b8;">Forgot Password?</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input id="fullName" placeholder="Full Name">
                    <input id="username" placeholder="Username">
                    <input id="gmail" placeholder="Gmail">
                    <input id="phoneNum" placeholder="Phone Number">
                    <select id="userType">
                        <option value="Commission Based">Commission Based</option>
                        <option value="Salary Based">Salary Based</option>
                    </select>
                    <input id="pass" type="password" placeholder="Password">
                    <input id="confirmPass" type="password" placeholder="Confirm Password">
                    <button id="doSignup" style="width:100%; margin:10px 0;">Register</button>
                    <button id="backLogin" style="background:transparent; border:1px solid #475569;">Back to Login</button>
                </div>
            </div>
        `; 
        attachAuthEvents(); 
    }
    
    function attachAuthEvents() { 
        document.getElementById("doLogin")?.addEventListener("click", async () => { 
            let email = document.getElementById("loginEmail").value; 
            let pass = document.getElementById("loginPass").value; 
            if(!email || !pass) { showToast("Please fill all fields", true); return; }
            showToast("Logging in...");
            let res = await apiCall("login", { email, pass }); 
            if(res.success) { 
                localStorage.setItem("mts_token", res.token); 
                showToast("Login successful!");
                location.reload(); 
            } else { 
                showToast(res.error || "Login failed", true); 
            } 
        }); 
        
        document.getElementById("showSignupBtn")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        });
        
        document.getElementById("backLogin")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("signupForm").style.display = "none";
        });
        
        document.getElementById("doSignup")?.addEventListener("click", async () => { 
            let fullName = document.getElementById("fullName").value;
            let username = document.getElementById("username").value;
            let gmail = document.getElementById("gmail").value;
            let phone = document.getElementById("phoneNum").value;
            let userType = document.getElementById("userType").value;
            let password = document.getElementById("pass").value;
            let confirm = document.getElementById("confirmPass").value;
            
            if(!fullName || !username || !gmail || !phone || !password) {
                showToast("Please fill all fields", true);
                return;
            }
            if(password !== confirm) {
                showToast("Passwords do not match", true);
                return;
            }
            
            showToast("Creating account...");
            let res = await apiCall("signup", { fullName, username, gmail, phone, userType, password, confirm }); 
            if(res.success) { 
                showToast("Account created! Please login.");
                document.getElementById("loginForm").style.display = "block";
                document.getElementById("signupForm").style.display = "none";
                document.getElementById("loginEmail").value = gmail;
            } else { 
                showToast(res.error || "Signup failed", true); 
            } 
        });
        
        document.getElementById("forgotBtn")?.addEventListener("click", () => showToast("Contact admin to reset password."));
    }
    
    // ========== SERVICES PAGE WITH PLATFORM FILTER ==========
    async function renderServices() { 
        await loadServices(); 
        let platformsHtml = platforms.map(p => `
            <div class="platform-icon-item" data-platform="${p.name}">
                <i class="${p.icon}" style="color: ${p.color}"></i>
                <span>${p.name}</span>
            </div>
        `).join('');
        
        let html = `
            <div class="glass-card">
                <h3 style="margin-bottom:20px;"><i class="fas fa-filter"></i> Filter by Platform</h3>
                <div class="platform-icons" id="servicePlatformIcons">
                    <div class="platform-icon-item active" data-platform="all">
                        <i class="fas fa-th-large"></i>
                        <span>All</span>
                    </div>
                    ${platformsHtml}
                </div>
                <input type="text" id="searchServiceInput" placeholder="🔍 Search services by name..." style="margin-top: 20px;">
            </div>
            <div id="servicesGrid" class="service-grid"></div>
        `;
        document.getElementById("pageContent").innerHTML = html;
        
        // Add click handlers for platform icons
        document.querySelectorAll('#servicePlatformIcons .platform-icon-item').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('#servicePlatformIcons .platform-icon-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                filterServicesByPlatform();
            });
        });
        
        document.getElementById("searchServiceInput").addEventListener("input", filterServicesByPlatform);
        filterServicesByPlatform();
    }
    
    function filterServicesByPlatform() {
        let activePlatform = document.querySelector('#servicePlatformIcons .platform-icon-item.active')?.dataset.platform || 'all';
        let searchTerm = document.getElementById("searchServiceInput")?.value.toLowerCase() || "";
        
        let filtered = allServices.filter(s => {
            let matchesPlatform = (activePlatform === 'all' || s.Platform === activePlatform);
            let matchesSearch = s.Name?.toLowerCase().includes(searchTerm) || s.ServiceId?.toString().includes(searchTerm);
            return matchesPlatform && matchesSearch;
        });
        
        let grid = document.getElementById("servicesGrid");
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="glass-card" style="text-align:center; grid-column:1/-1;">No services found</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(s => {
            let ratePerUnit = s.Per1k ? s.Rate / 1000 : s.Rate;
            let platformIcon = platforms.find(p => p.name === s.Platform) || platforms[0];
            return `
                <div class="glass-card service-card" onclick="quickOrderFromService('${s.ServiceId}')">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <i class="${platformIcon?.icon || 'fas fa-globe'}" style="font-size:28px; color:${platformIcon?.color || '#fff'}"></i>
                        <h3 style="font-size:18px;">${s.Name}</h3>
                    </div>
                    <div style="margin-top:10px;">
                        <p><i class="fas fa-tag"></i> <strong>Rate:</strong> ${formatCurr(ratePerUnit)} ${s.Per1k ? '/1000' : '/unit'}</p>
                        <p><i class="fas fa-chart-line"></i> <strong>Min/Max:</strong> ${s.MinQty} - ${s.MaxQty}</p>
                        <p><i class="fas fa-clock"></i> <strong>Delivery:</strong> ${s.DeliveryTime || '1-2 hours'}</p>
                    </div>
                    <button class="btn" style="margin-top:15px; width:100%;" onclick="event.stopPropagation(); navigateTo('home'); setTimeout(()=>selectServiceByPlatform('${s.Platform}', '${s.ServiceId}'), 100);">
                        Order Now <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            `;
        }).join('');
    }
    
    window.quickOrderFromService = (serviceId) => {
        let service = allServices.find(s => s.ServiceId === serviceId);
        if (service) {
            navigateTo('home');
            setTimeout(() => selectServiceByPlatform(service.Platform, service.ServiceId), 100);
        }
    };
    
    function selectServiceByPlatform(platform, serviceId) {
        // This will be called after navigating to home
        let platformSelect = document.getElementById("platformSelect");
        if (platformSelect) {
            platformSelect.value = platform;
            updateServiceDropdown();
            setTimeout(() => {
                document.getElementById("serviceSelect").value = serviceId;
                showServiceDetails();
            }, 100);
        }
    }
    
    // ========== HOME PAGE WITH ORDER FORM ==========
    async function renderHome() { 
        await loadServices();
        let balance = currentUser?.wallet || 0;
        
        let platformsHtml = platforms.map(p => `
            <div class="platform-icon-item" data-platform="${p.name}">
                <i class="${p.icon}" style="color: ${p.color}"></i>
                <span>${p.name}</span>
            </div>
        `).join('');
        
        let html = `
            <div class="glass-card" style="margin-bottom:20px;">
                <h3><i class="fas fa-coins"></i> Wallet Balance: ${formatCurr(balance)}</h3>
            </div>
            
            <div class="glass-card">
                <h3 style="margin-bottom:20px;"><i class="fas fa-filter"></i> Filter by Platform</h3>
                <div class="platform-icons" id="homePlatformIcons">
                    ${platformsHtml}
                </div>
                
                <div class="form-row" style="margin-top: 25px;">
                    <div style="flex:1">
                        <label><i class="fas fa-chart-simple"></i> Select Platform</label>
                        <select id="platformSelect">
                            <option value="">Choose Platform</option>
                            ${platforms.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                        </select>
                    </div>
                    <div style="flex:2">
                        <label><i class="fas fa-list"></i> Select Service</label>
                        <select id="serviceSelect">
                            <option value="">Select a service</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div style="flex:1">
                        <label><i class="fas fa-sort-numeric-up"></i> Quantity</label>
                        <input type="number" id="quantity" placeholder="Enter quantity" min="1">
                    </div>
                </div>
                
                <div id="dynamicFields"></div>
                <div id="serviceDetails" class="service-detail-card" style="display:none;"></div>
                
                <div class="order-summary" id="orderSummary" style="display:none;">
                    <h4>Order Summary</h4>
                    <p><strong>Service Price:</strong> <span id="servicePrice">0</span></p>
                    <p><strong>Total Amount:</strong> <span id="totalAmount">0</span></p>
                </div>
                
                <div class="form-row" style="margin-top: 20px;">
                    <button id="placeOrderBtn" class="btn" style="flex:1"><i class="fas fa-shopping-cart"></i> Place Order</button>
                    <button id="clearFormBtn" class="btn btn-secondary" style="flex:1"><i class="fas fa-eraser"></i> Clear Form</button>
                </div>
            </div>
        `;
        
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#homePlatformIcons .platform-icon-item').forEach(el => {
            el.addEventListener('click', () => {
                const platform = el.dataset.platform;
                document.getElementById('platformSelect').value = platform;
                updateServiceDropdown();
                document.querySelectorAll('#homePlatformIcons .platform-icon-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            });
        });
        
        document.getElementById("platformSelect").addEventListener("change", updateServiceDropdown);
        document.getElementById("serviceSelect").addEventListener("change", showServiceDetails);
        document.getElementById("quantity").addEventListener("input", calculateTotal);
        document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);
        document.getElementById("clearFormBtn").addEventListener("click", clearOrderForm);
        
        updateServiceDropdown();
    }
    
    function updateServiceDropdown() {
        let platform = document.getElementById("platformSelect").value;
        let filtered = platform ? allServices.filter(s => s.Platform === platform) : [];
        let select = document.getElementById("serviceSelect");
        select.innerHTML = '<option value="">Select a service</option>';
        filtered.forEach(s => {
            let opt = document.createElement("option");
            opt.value = s.ServiceId;
            let ratePerUnit = s.Per1k ? s.Rate/1000 : s.Rate;
            opt.innerText = `${s.Name} - ${formatCurr(ratePerUnit)} ${s.Per1k ? '/1k' : '/unit'}`;
            select.appendChild(opt);
        });
        selectedService = null;
        document.getElementById("serviceDetails").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
        document.getElementById("dynamicFields").innerHTML = "";
    }
    
    function showServiceDetails() {
        let serviceId = document.getElementById("serviceSelect").value;
        if (!serviceId) return;
        selectedService = allServices.find(s => s.ServiceId === serviceId);
        if (!selectedService) return;
        
        let ratePerUnit = selectedService.Per1k ? selectedService.Rate / 1000 : selectedService.Rate;
        
        let detailsHtml = `
            <h4>${selectedService.Name}</h4>
            <p><i class="fas fa-tag"></i> <strong>Rate:</strong> ${formatCurr(ratePerUnit)} ${selectedService.Per1k ? '(per 1000)' : '(per unit)'}</p>
            <p><i class="fas fa-chart-line"></i> <strong>Min Order:</strong> ${selectedService.MinQty} | <strong>Max Order:</strong> ${selectedService.MaxQty}</p>
            <p><i class="fas fa-clock"></i> <strong>Delivery Time:</strong> ${selectedService.DeliveryTime || '1-2 hours'}</p>
            <p><i class="fas fa-info-circle"></i> <strong>Description:</strong> ${selectedService.Description || 'High quality service'}</p>
            ${selectedService.Refill ? '<p><i class="fas fa-refresh"></i> <strong>Refill Available:</strong> Yes</p>' : ''}
        `;
        
        document.getElementById("serviceDetails").innerHTML = detailsHtml;
        document.getElementById("serviceDetails").style.display = "block";
        
        let dynamicHtml = '';
        if (selectedService.IsAccount === true || selectedService.IsAccount === "TRUE") {
            dynamicHtml += `<div class="form-row"><div style="flex:1"><label><i class="fas fa-envelope"></i> Email Address</label><input type="email" id="emailField" placeholder="Enter email for account"></div></div>`;
        } else {
            dynamicHtml += `<div class="form-row"><div style="flex:1"><label><i class="fas fa-link"></i> Profile/Post Link</label><input type="url" id="linkField" placeholder="Enter your profile/post link (Instagram/TikTok/Facebook URL)"></div></div>`;
        }
        
        if (selectedService.CustomComments === true || selectedService.CustomComments === "TRUE") {
            dynamicHtml += `<div class="form-row"><div style="flex:1"><label><i class="fas fa-comments"></i> Custom Comments (comma separated)</label><textarea id="commentsField" placeholder="Enter comments separated by commas (e.g., Great!, Awesome, Love it)"></textarea></div></div>`;
        }
        
        document.getElementById("dynamicFields").innerHTML = dynamicHtml;
        calculateTotal();
    }
    
    function calculateTotal() {
        if (!selectedService) return;
        let quantity = parseInt(document.getElementById("quantity").value) || 0;
        let minQty = parseInt(selectedService.MinQty) || 1;
        let maxQty = parseInt(selectedService.MaxQty) || 10000;
        
        if (quantity < minQty && quantity > 0) {
            document.getElementById("orderSummary").style.display = "none";
            showToast(`Minimum quantity is ${minQty}`, true);
            return;
        }
        if (quantity > maxQty) {
            document.getElementById("orderSummary").style.display = "none";
            showToast(`Maximum quantity is ${maxQty}`, true);
            return;
        }
        if (quantity === 0) {
            document.getElementById("orderSummary").style.display = "none";
            return;
        }
        
        let totalPKR;
        if (selectedService.Per1k === true || selectedService.Per1k === "TRUE") {
            totalPKR = (selectedService.Rate / 1000) * quantity;
        } else {
            totalPKR = selectedService.Rate * quantity;
        }
        
        let servicePricePKR = selectedService.Per1k ? selectedService.Rate / 1000 : selectedService.Rate;
        
        document.getElementById("servicePrice").innerHTML = formatCurr(servicePricePKR);
        document.getElementById("totalAmount").innerHTML = formatCurr(totalPKR);
        document.getElementById("orderSummary").style.display = "block";
        
        selectedService.calculatedTotal = totalPKR;
    }
    
    async function placeOrder() {
        if (!selectedService) {
            showToast("Please select a service first", true);
            return;
        }
        
        let quantity = parseInt(document.getElementById("quantity").value);
        let minQty = parseInt(selectedService.MinQty);
        let maxQty = parseInt(selectedService.MaxQty);
        
        if (!quantity || quantity < minQty) {
            showToast(`Minimum quantity is ${minQty}`, true);
            return;
        }
        if (quantity > maxQty) {
            showToast(`Maximum quantity is ${maxQty}`, true);
            return;
        }
        
        let currentBalance = currentUser?.wallet || 0;
        if (currentBalance < selectedService.calculatedTotal) {
            showToast(`Insufficient balance! Need ${formatCurr(selectedService.calculatedTotal)}. Please add funds.`, true);
            return;
        }
        
        let extraFields = {};
        let emailField = document.getElementById("emailField");
        let linkField = document.getElementById("linkField");
        let commentsField = document.getElementById("commentsField");
        
        if (emailField) extraFields.email = emailField.value;
        if (linkField) extraFields.link = linkField.value;
        if (commentsField) extraFields.comments = commentsField.value;
        
        showToast("Placing order...");
        
        let res = await apiCall("createOrder", {
            serviceId: selectedService.ServiceId,
            quantity: quantity,
            totalAmount: selectedService.calculatedTotal,
            extraFields: extraFields
        });
        
        if (res.success) {
            document.getElementById("successMessage").innerHTML = `
                <strong>Order ID:</strong> ${res.orderId}<br>
                <strong>Service:</strong> ${selectedService.Name}<br>
                <strong>Quantity:</strong> ${quantity}<br>
                <strong>Amount:</strong> ${formatCurr(selectedService.calculatedTotal)}<br>
                Your order has been placed successfully!
            `;
            document.getElementById("successModal").style.display = "block";
        } else {
            showToast(res.error || "Order failed", true);
        }
    }
    
    function clearOrderForm() {
        document.getElementById("platformSelect").value = "";
        document.getElementById("serviceSelect").innerHTML = '<option value="">Select a service</option>';
        document.getElementById("quantity").value = "";
        document.getElementById("dynamicFields").innerHTML = "";
        document.getElementById("serviceDetails").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
        selectedService = null;
        document.querySelectorAll('#homePlatformIcons .platform-icon-item').forEach(i => i.classList.remove('active'));
        showToast("Form cleared");
    }

                <div id="proofFormSection" style="display:none; margin-top:25px; padding-top:20px; border-top:1px solid #2d3a5e;">
                    <h4>Submit Payment Proof</h4>
                    <div class="form-row">
                        <div style="flex:1">

                            <input type="number" id="amountFund" placeholder="Enter amount you sent">
                        </div>
                        <div style="flex:1">
                            <label>Transaction ID</label>
                            <input id="transId" placeholder="Transaction/Reference ID">
                        </div>
                    </div>
                    <div class="form-row">
                        <div style="flex:1">
                            <label>Your Email</label>
                            <input id="fundEmail" placeholder="Email for confirmation" value="${currentUser?.gmail || ''}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div style="flex:1">

                            <input type="file" id="screenshot" accept="image/*">
                            <small style="color:#94a3b8;">Upload screenshot of transaction</small>
                        </div>
                    </div>
                    <div class="form-row">
                        <button id="submitProofBtn" class="btn" style="flex:1;"><i class="fas fa-paper-plane"></i> Submit Proof</button>
                        <button id="cancelProofBtn" class="btn btn-secondary" style="flex:1;"><i class="fas fa-times"></i> Cancel</button>
                    </div>

            </div>
        `;
        
        document.getElementById("pageContent").innerHTML = html;
        
        let selectedMethod = null;
        let sentProofBtn = document.getElementById("sentProofBtn");
        let proofSection = document.getElementById("proofFormSection");
        
        // Add click handlers for payment methods
        document.querySelectorAll('.payment-method-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.payment-method-card').forEach(c => {
                    c.classList.remove('selected');
                    c.querySelector('.selected-check').style.display = 'none';
                });
                card.classList.add('selected');
                card.querySelector('.selected-check').style.display = 'block';
                selectedMethod = card.dataset.method;
                sentProofBtn.disabled = false;
                sentProofBtn.style.opacity = '1';

        });
        
        sentProofBtn.addEventListener('click', () => {
            if (!selectedMethod) {

    window.navigateTo = (page) => navigate(page);
    function navigate(page) { 
        if(page === "home") renderHome(); 
        else if(page === "dashboard") renderDashboard(); 
        else if(page === "services") renderServices(); 
        else if(page === "addfunds") renderAddFunds(); 
        else if(page === "recommendations") renderRecommendations(); 
        else if(page === "joinus") renderJoinUs(); 
        else if(page === "help") renderHelp(); 
    }
    
    document.querySelectorAll("[data-page]").forEach(el => el.addEventListener("click", (e) => { 
        e.preventDefault(); 
        let page = el.getAttribute("data-page"); 
        navigate(page); 
        document.getElementById("sidebar").classList.remove("open"); 
        document.getElementById("overlay").style.display = "none"; 
    }));
