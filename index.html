<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4); padding: 24px; transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.5); transform: translateY(-2px); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover, .btn:hover { transform: scale(1.02); background: linear-gradient(90deg, #1e5ad9, #1240a0); }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 24px; color: white; width: 100%; outline: none; margin: 8px 0; }
        input:focus, select:focus { border-color: #3b82f6; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.96); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 60px; margin-bottom: 25px; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin: 25px 0; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172ae6; backdrop-filter: blur(20px); border-radius: 32px; padding: 24px; width: 90%; max-width: 500px; z-index: 1100; display: none; border: 1px solid cyan; }
        @media (max-width: 640px) { .main-content { padding: 12px; } }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 2000; border-left: 4px solid #2b6ef0; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
        <h3><i class="fas fa-chart-line"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 15px;">
        <a href="#" data-page="home"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="recommendations"><i class="fas fa-star"></i> Recommendations</a>
        <a href="#" data-page="joinus"><i class="fas fa-user-plus"></i> Join Us & Earn</a>
        <a href="#" data-page="help"><i class="fas fa-question-circle"></i> Help</a>
        <div class="currency-toggle" style="margin-top: 20px;">
            <label>Currency:</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button data-curr="PKR">PKR</button><button data-curr="USD">USD</button><button data-curr="AED">AED</button><button data-curr="SAR">SAR</button><button data-curr="INR">INR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700; font-size:1.2rem;">MTS SMM Services</div>
        <div class="user-info"><i class="fas fa-sync-alt refresh-btn" id="refreshBtn"></i><span id="userAvatar"><i class="fas fa-user-circle"></i></span><span id="userNameDisplay">Guest</span></div>
    </div>
    <div id="pageContent">Loading...</div>
</div>

<div id="profileModal" class="modal"><div id="profileForm"></div><button id="closeProfile">Close</button></div>

<script>
    // ========== IMPORTANT: REPLACE WITH YOUR APPS SCRIPT URL ==========
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuNLYLGZ0dZljTV4KxTpScJIAUx6UurrSqSS2qRdICVrrzMzBCt-o3BQxWs3XnQoZ5/exec"; // <- PUT YOUR DEPLOYED URL HERE!
    // ===================================================================
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let exchangeRates = { PKR:1, USD:0.0036, AED:0.0132, SAR:0.0135, INR:0.3 };
    let allServices = [];
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
   async function apiCall(action, data = {}) {

    const payload = {
        action,
        ...data,
        sessionToken: localStorage.getItem("mts_token")
    };

    const formData = new FormData();

    formData.append(
        "payload",
        JSON.stringify(payload)
    );

    try {

        const res = await fetch(
            APPS_SCRIPT_URL,
            {
                method: "POST",
                body: formData
            }
        );

        const text = await res.text();

        console.log(text);

        return JSON.parse(text);

    } catch(err) {

        console.error(err);

        return {
            success:false,
            error:err.message
        };
    }
}
    
    function convertPrice(pricePKR) { let val = pricePKR * (exchangeRates[activeCurrency] || 1); return Math.round(val * 100)/100; }
    function formatCurr(amountPKR) { return `${activeCurrency} ${convertPrice(amountPKR).toFixed(2)}`; }
    
    async function loadServices() { 
        let res = await apiCall("getServices"); 
        if(res.success) allServices = res.services; 
        else showToast("Failed to load services", true);
    }
    
    async function checkAuth() { 
        let token = localStorage.getItem("mts_token"); 
        if(!token) { showAuthScreen(); return false; } 
        let res = await apiCall("verifySession", { token }); 
        if(res.success) { 
            currentUser = res.user; 
            document.getElementById("userNameDisplay").innerText = currentUser.fullName.split(" ")[0]; 
            return true; 
        } else { 
            localStorage.removeItem("mts_token"); 
            showAuthScreen(); 
            return false; 
        } 
    }
    
    function showAuthScreen() { 
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:50px auto;padding:30px;">
                <h2 style="margin-bottom:20px;"><i class="fas fa-rocket"></i> Welcome to MTS SMM</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" style="width:100%; margin:10px 0;">Login</button>
                    <button id="showSignupBtn" style="background:transparent; border:1px solid #2b6ef0;">Create Account</button>
                    <button id="forgotBtn" style="background:transparent; color:#94a3b8;">Forgot Password?</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input id="fullName" placeholder="Full Name">
                    <input id="username" placeholder="Username">
                    <input id="gmail" placeholder="Gmail">
                    <input id="phoneNum" placeholder="Phone Number">
                    <select id="userType">
                        <option value="Commission Based">Commission Based</option>
                        <option value="Salary Based">Salary Based</option>
                    </select>
                    <input id="pass" type="password" placeholder="Password">
                    <input id="confirmPass" type="password" placeholder="Confirm Password">
                    <button id="doSignup" style="width:100%; margin:10px 0;">Register</button>
                    <button id="backLogin" style="background:transparent; border:1px solid #475569;">Back to Login</button>
                </div>
            </div>
        `; 
        attachAuthEvents(); 
    }
    
    function attachAuthEvents() { 
        document.getElementById("doLogin")?.addEventListener("click", async () => { 
            let email = document.getElementById("loginEmail").value; 
            let pass = document.getElementById("loginPass").value; 
            if(!email || !pass) { showToast("Please fill all fields", true); return; }
            showToast("Logging in...");
            let res = await apiCall("login", { email, pass }); 
            if(res.success) { 
                localStorage.setItem("mts_token", res.token); 
                showToast("Login successful!");
                location.reload(); 
            } else { 
                showToast(res.error || "Login failed", true); 
            } 
        }); 
        
        document.getElementById("showSignupBtn")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        });
        
        document.getElementById("backLogin")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("signupForm").style.display = "none";
        });
        
        document.getElementById("doSignup")?.addEventListener("click", async () => { 
            let fullName = document.getElementById("fullName").value;
            let username = document.getElementById("username").value;
            let gmail = document.getElementById("gmail").value;
            let phone = document.getElementById("phoneNum").value;
            let userType = document.getElementById("userType").value;
            let password = document.getElementById("pass").value;
            let confirm = document.getElementById("confirmPass").value;
            
            if(!fullName || !username || !gmail || !phone || !password) {
                showToast("Please fill all fields", true);
                return;
            }
            if(password !== confirm) {
                showToast("Passwords do not match", true);
                return;
            }
            
            showToast("Creating account...");
            let res = await apiCall("signup", { fullName, username, gmail, phone, userType, password, confirm }); 
            if(res.success) { 
                showToast("Account created! Please login.");
                document.getElementById("loginForm").style.display = "block";
                document.getElementById("signupForm").style.display = "none";
                document.getElementById("loginEmail").value = gmail;
            } else { 
                showToast(res.error || "Signup failed", true); 
            } 
        });
        
        document.getElementById("forgotBtn")?.addEventListener("click", () => showToast("Contact admin to reset password."));
    }
    
    // Pages (simplified for demo)
    async function renderHome() { 
        await loadServices(); 
        let balance = currentUser?.wallet || 0;
        let html = `<div class="glass-card" style="margin-bottom:20px;"><h3><i class="fas fa-coins"></i> Wallet Balance: ${formatCurr(balance)}</h3></div>
        <div class="glass-card"><h2>Order Service</h2><p>Select a service from the Services page to place an order.</p><button onclick="navigateTo('services')" class="btn">Browse Services</button></div>`;
        document.getElementById("pageContent").innerHTML = html;
    }
    
    async function renderDashboard() { 
        let stats = await apiCall("userStats"); 
        let orders = await apiCall("getUserOrders"); 
        let html = `<div class="grid-cards">
            <div class="glass-card">💰 Balance: ${formatCurr(currentUser.wallet)}</div>
            <div class="glass-card">📦 Total Orders: ${stats.totalOrders || 0}</div>
            <div class="glass-card">⏳ Pending: ${stats.pendingOrders || 0}</div>
        </div>
        <div class="glass-card"><h3>Order History</h3>
        <div style="overflow-x:auto;">${orders.orders?.length ? '<table style="width:100%"><tr><th>Order ID</th><th>Service</th><th>Qty</th><th>Amount</th><th>Status</th></tr>' + orders.orders.map(o => `<tr><td>${o.id}</td><td>${o.serviceName}</td><td>${o.qty}</td><td>${formatCurr(o.amount)}</td><td>${o.status}</td></tr>`).join('') + '</table>' : '<p>No orders yet</p>'}</div></div>`;
        document.getElementById("pageContent").innerHTML = html;
    }
    
    async function renderServices() { 
        await loadServices(); 
        let html = `<div class="glass-card"><input id="searchService" placeholder="🔍 Search by name or ID..."></div>
        <div class="service-grid" id="serviceGrid"></div>`;
        document.getElementById("pageContent").innerHTML = html;
        document.getElementById("searchService").addEventListener("input", filterServices);
        filterServices();
    }
    
    function filterServices() { 
        let kw = document.getElementById("searchService")?.value.toLowerCase() || ""; 
        let filtered = allServices.filter(s => s.Name?.toLowerCase().includes(kw) || s.ServiceId?.toString().includes(kw)); 
        document.getElementById("serviceGrid").innerHTML = filtered.map(s => `<div class="glass-card"><i class="fab fa-${(s.Platform || '').toLowerCase()}"></i> <strong>${s.Name}</strong><br>Platform: ${s.Platform}<br>Rate: ${formatCurr(s.Per1k ? s.Rate/1000 : s.Rate)} ${s.Per1k ? 'per 1k' : 'per unit'}<br>Min: ${s.MinQty} Max: ${s.MaxQty}<br><button onclick="alert('Order from Home page')">Order</button></div>`).join(''); 
        if(filtered.length === 0) document.getElementById("serviceGrid").innerHTML = "<p>No services found</p>";
    }
    
    async function renderAddFunds() { 
        let html = `<div class="glass-card"><h3><i class="fas fa-university"></i> Add Funds</h3>
        <div style="background:#1e293b; border-radius:20px; padding:15px; margin:15px 0;"><i class="fas fa-mobile-alt"></i> <strong>Easypaisa:</strong> 03198595421 - Muhammad Ramzan Al Sami</div>
        <div style="background:#1e293b; border-radius:20px; padding:15px; margin:15px 0;"><i class="fas fa-credit-card"></i> <strong>Sadapay:</strong> 03198595421 - Muhammad Ramzan Ul Sami</div>
        <button id="sentProof" class="btn">I Have Sent Payment</button>
        <div id="proofForm" style="display:none; margin-top:20px;">
            <input id="amountFund" placeholder="Amount (PKR)" type="number">
            <input id="transId" placeholder="Transaction ID">
            <input id="fundEmail" placeholder="Your Email">
            <input type="file" id="screenshot" accept="image/*">
            <button id="submitProof" class="btn" style="margin-top:10px;">Submit Proof</button>
        </div></div>`;
        document.getElementById("pageContent").innerHTML = html; 
        document.getElementById("sentProof").onclick = () => { document.getElementById("proofForm").style.display = "block"; };
        document.getElementById("submitProof").onclick = async () => { 
            let file = document.getElementById("screenshot").files[0];
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("addFundsRequest", {
                    amount: document.getElementById("amountFund").value,
                    transactionId: document.getElementById("transId").value,
                    email: document.getElementById("fundEmail").value,
                    screenshotBase64: reader.result
                });
                showToast(res.message || "Request submitted");
                if(res.success) document.getElementById("proofForm").style.display = "none";
            };
            if(file) reader.readAsDataURL(file);
            else showToast("Please upload screenshot", true);
        };
    }
    
    async function renderRecommendations() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Share Your Experience</h3>
            <input id="recEmail" placeholder="Email"><input id="recWhatsapp" placeholder="WhatsApp"><input id="recPhone" placeholder="Phone"><textarea id="recText" placeholder="Your Recommendation"></textarea>
            <button id="submitRec" class="btn">Submit</button></div>`;
        document.getElementById("submitRec").onclick = async () => {
            let res = await apiCall("submitRecommendation", {
                email: document.getElementById("recEmail").value,
                whatsapp: document.getElementById("recWhatsapp").value,
                phone: document.getElementById("recPhone").value,
                text: document.getElementById("recText").value
            });
            showToast(res.message);
        };
    }
    
    async function renderJoinUs() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Join Our Team</h3>
            <input id="appName" placeholder="Full Name"><input id="appPhone" placeholder="Phone"><input id="appWhatsapp" placeholder="WhatsApp"><input id="appEmail" placeholder="Email">
            <select id="appSalaryType"><option>Commission Based</option><option>Salary Based</option></select>
            <input id="appHours" placeholder="Available hours (4/5/6)"><select id="appShift"><option>Day</option><option>Night</option></select>
            <textarea id="appAbout" placeholder="About Yourself"></textarea>
            <input type="file" id="appPhoto" accept="image/*">
            <button id="submitJoin" class="btn">Apply Now</button></div>`;
        document.getElementById("submitJoin").onclick = async () => {
            let file = document.getElementById("appPhoto").files[0];
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("submitJoinRequest", {
                    name: document.getElementById("appName").value,
                    phone: document.getElementById("appPhone").value,
                    whatsapp: document.getElementById("appWhatsapp").value,
                    email: document.getElementById("appEmail").value,
                    salaryType: document.getElementById("appSalaryType").value,
                    hours: document.getElementById("appHours").value,
                    shift: document.getElementById("appShift").value,
                    about: document.getElementById("appAbout").value,
                    photo: reader.result
                });
                showToast(res.message);
            };
            if(file) reader.readAsDataURL(file);
            else showToast("Please upload photo", true);
        };
    }
    
    async function renderHelp() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Need Help?</h3>
            <input id="helpEmail" placeholder="Email"><input id="helpPhone" placeholder="Phone/WhatsApp"><textarea id="helpMsg" placeholder="Your Message"></textarea>
            <button id="submitHelp" class="btn">Send</button></div>`;
        document.getElementById("submitHelp").onclick = async () => {
            let res = await apiCall("submitHelp", {
                email: document.getElementById("helpEmail").value,
                phone: document.getElementById("helpPhone").value,
                message: document.getElementById("helpMsg").value
            });
            showToast(res.message);
        };
    }
    
    window.navigateTo = (page) => navigate(page);
    function navigate(page) { 
        if(page === "home") renderHome(); 
        else if(page === "dashboard") renderDashboard(); 
        else if(page === "services") renderServices(); 
        else if(page === "addfunds") renderAddFunds(); 
        else if(page === "recommendations") renderRecommendations(); 
        else if(page === "joinus") renderJoinUs(); 
        else if(page === "help") renderHelp(); 
    }
    
    // Navigation setup
    document.querySelectorAll("[data-page]").forEach(el => el.addEventListener("click", (e) => { 
        e.preventDefault(); 
        let page = el.getAttribute("data-page"); 
        navigate(page); 
        document.getElementById("sidebar").classList.remove("open"); 
        document.getElementById("overlay").style.display = "none"; 
    }));
    
    document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; };
    document.getElementById("closeSidebar").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("overlay").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("refreshBtn").onclick = () => { if(currentUser) navigate("home"); else showAuthScreen(); };
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("mts_token"); location.reload(); };
    
    document.getElementById("currencyGroup")?.addEventListener("click", (e) => { if(e.target.dataset.curr) { activeCurrency = e.target.dataset.curr; if(currentUser) navigate("home"); } });
    
    (async function init() { 
        if(await checkAuth()) { 
            await loadServices(); 
            navigate("home"); 
        } 
    })();
</script>
</body>
</html>
